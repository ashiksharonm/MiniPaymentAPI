services:
  - type: web
    name: mini-payments-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        value: demo-api-key-12345
      - key: DATABASE_URL
        value: sqlite:///./mini_payments.db
      - key: DEBUG
        value: "false"
